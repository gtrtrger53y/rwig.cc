<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rwib.cc</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,300;1,9..144,700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f2ede6;
      --ink: #111009;
      --mid: #7a7060;
      --accent: #d4420a;
      --border: #ddd6cc;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      padding: 28px 48px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: 17px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .wordmark em {
      font-style: italic;
      font-weight: 300;
      color: var(--mid);
      font-size: 13px;
      margin-left: 10px;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.15s;
    }

    .nav-links a:hover { color: var(--accent); }

    /* ── HERO ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px 48px;
      max-width: 960px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 32px;
      opacity: 0;
      animation: in 0.5s ease 0.05s forwards;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 900;
      font-size: clamp(52px, 9vw, 108px);
      line-height: 0.95;
      letter-spacing: -0.03em;
      color: var(--ink);
      margin-bottom: 40px;
      opacity: 0;
      animation: in 0.6s ease 0.15s forwards;
    }

    h1 em {
      font-style: italic;
      font-weight: 300;
      color: var(--mid);
    }

    h1 .hot { color: var(--accent); }

    .desc {
      font-size: 15px;
      color: var(--mid);
      line-height: 1.7;
      max-width: 440px;
      margin-bottom: 52px;
      font-weight: 300;
      opacity: 0;
      animation: in 0.6s ease 0.25s forwards;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 24px;
      opacity: 0;
      animation: in 0.6s ease 0.35s forwards;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--ink);
      color: var(--bg);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 24px;
      border-radius: 2px;
      transition: background 0.15s, color 0.15s;
    }

    .btn-primary:hover {
      background: var(--accent);
    }

    .btn-primary svg { flex-shrink: 0; }

    .btn-ghost {
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-ghost:hover {
      color: var(--ink);
      border-color: var(--ink);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 22px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    footer p {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.06em;
    }

    @keyframes in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      nav { padding: 20px 24px; }
      nav .wordmark em { display: none; }
      main { padding: 60px 24px; }
      footer { padding: 18px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="wordmark">rwib.cc <em>Random Website I Bought</em></a>
    <ul class="nav-links">
      <li><a href="https://github.com/gtrtrger53y" target="_blank" rel="noopener">GitHub</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <main>
    <p class="eyebrow">// est. whenever</p>
    <h1>Just a<br /><em>random</em><br /><span class="hot">website.</span></h1>
    <p class="desc">Bought the domain. Did stuff with it. Here we are.</p>
    <div class="links">
      <a href="https://github.com/gtrtrger53y" class="btn-primary" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </a>
      <a href="contact.html" class="btn-ghost">Contact →</a>
    </div>
  </main>

  <footer>
    <p>rwib.cc</p>
    <p>Cloudflare Pages</p>
  </footer>

</body>
</html>
